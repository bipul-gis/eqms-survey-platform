server {
    listen 80;
    listen [::]:80;
    server_name geosurvey.eqmscl.com www.geosurvey.eqmscl.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name geosurvey.eqmscl.com www.geosurvey.eqmscl.com;

    # Certbot will populate these after: certbot --nginx -d geosurvey.eqmscl.com
    ssl_certificate /etc/letsencrypt/live/geosurvey.eqmscl.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/geosurvey.eqmscl.com/privkey.pem;

    root /var/www/eqms-geosurvey/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
